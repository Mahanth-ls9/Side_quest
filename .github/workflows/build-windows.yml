name: Build Windows Installer

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Install Runtime Dependencies
        shell: pwsh
        run: |
          choco install yt-dlp ffmpeg chromaprint -y --no-progress

      - name: Verify Runtime Dependencies
        shell: pwsh
        run: |
          yt-dlp --version
          ffmpeg -version
          fpcalc -version

      - name: Build Jar
        run: mvn -B clean package -DskipTests

      - name: Package EXE
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $appVersion = "1.0.$env:GITHUB_RUN_NUMBER"
          $upgradeUuid = "0d3274e4-2a1d-4d64-8f6e-bf1306d77d4a"

          jpackage `
            --type msi `
            --name "Audio Downloader Pro" `
            --app-version $appVersion `
            --input target `
            --main-jar "audio-downloader-pro-1.0.0.jar" `
            --main-class "org.springframework.boot.loader.launch.JarLauncher" `
            --dest dist `
            --vendor "Audio Downloader Pro Team" `
            --win-dir-chooser `
            --win-shortcut `
            --win-upgrade-uuid $upgradeUuid

          jpackage `
            --type exe `
            --name "Audio Downloader Pro" `
            --app-version $appVersion `
            --input target `
            --main-jar "audio-downloader-pro-1.0.0.jar" `
            --main-class "org.springframework.boot.loader.launch.JarLauncher" `
            --dest dist `
            --vendor "Audio Downloader Pro Team" `
            --win-dir-chooser `
            --win-shortcut `
            --win-upgrade-uuid $upgradeUuid `
            --win-console

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: audio-downloader-pro-windows-installers
          path: |
            dist/*.exe
            dist/*.msi
